<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Google Sans', Arial, sans-serif;
    font-size: 13px;
    color: #202124;
    background: #fff;
    padding: 12px;
  }

  h1 {
    font-size: 15px;
    font-weight: 600;
    color: #1a73e8;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #5f6368;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 5px;
  }

  input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 7px 9px;
    border: 1px solid #dadce0;
    border-radius: 4px;
    font-size: 13px;
    color: #202124;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    border-color: #1a73e8;
  }

  .toggle-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .toggle-btn {
    flex: 1;
    padding: 6px;
    border: 1px solid #dadce0;
    border-radius: 4px;
    background: #f8f9fa;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .toggle-btn.active {
    background: #e8f0fe;
    border-color: #1a73e8;
    color: #1a73e8;
  }

  .info-chip {
    display: inline-block;
    background: #f1f3f4;
    border-radius: 3px;
    padding: 4px 8px;
    font-size: 12px;
    color: #5f6368;
    width: 100%;
    word-break: break-all;
  }

  .batch-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .batch-row .batch-num {
    width: 60px;
    flex-shrink: 0;
  }
  .batch-row .batch-date {
    flex: 1;
  }
  .batch-label-preview {
    margin-top: 5px;
    font-size: 11px;
    color: #5f6368;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 9px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary {
    background: #1a73e8;
    color: #fff;
  }
  .btn-primary:hover { background: #1557b0; }
  .btn-primary:disabled { background: #dadce0; color: #9aa0a6; cursor: not-allowed; }
  .btn-success {
    background: #34a853;
    color: #fff;
    margin-top: 10px;
  }
  .btn-success:hover { background: #1e7e34; }

  .divider { border: none; border-top: 1px solid #e8eaed; margin: 14px 0; }

  .summary-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .badge {
    flex: 1;
    min-width: 70px;
    text-align: center;
    padding: 8px 4px;
    border-radius: 6px;
    font-size: 12px;
  }
  .badge .num { font-size: 20px; font-weight: 700; display: block; }
  .badge-new  { background: #e6f4ea; color: #137333; }
  .badge-dup  { background: #e8f0fe; color: #1a73e8; }
  .badge-rej  { background: #fce8e6; color: #c5221f; }

  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .results-table th {
    text-align: left;
    font-weight: 600;
    color: #5f6368;
    padding: 3px 4px;
    border-bottom: 1px solid #e8eaed;
  }
  .results-table td {
    padding: 3px 4px;
    border-bottom: 1px solid #f1f3f4;
    font-family: monospace;
    font-size: 11px;
  }
  .status-new { color: #137333; font-weight: 600; }
  .status-dup { color: #1a73e8; }

  .reject-list {
    font-size: 12px;
    color: #c5221f;
  }
  .reject-item {
    padding: 2px 0;
    border-bottom: 1px solid #fce8e6;
  }
  .reject-reason {
    font-size: 10px;
    color: #9aa0a6;
    float: right;
    font-style: italic;
  }

  .warning-box {
    background: #fef7e0;
    border: 1px solid #f9ab00;
    border-radius: 4px;
    padding: 8px;
    font-size: 12px;
    color: #7a4100;
    margin-bottom: 10px;
  }

  .error-box {
    background: #fce8e6;
    border: 1px solid #f44336;
    border-radius: 4px;
    padding: 8px;
    font-size: 12px;
    color: #b31412;
    margin-bottom: 10px;
  }

  .config-box {
    background: #e8f0fe;
    border: 1px solid #1a73e8;
    border-radius: 4px;
    padding: 10px;
    font-size: 12px;
    color: #174ea6;
    margin-bottom: 14px;
    line-height: 1.5;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #fff;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .success-box {
    background: #e6f4ea;
    border: 1px solid #34a853;
    border-radius: 4px;
    padding: 10px;
    font-size: 13px;
    color: #137333;
    font-weight: 500;
  }

  #results-section { display: none; }
  #sync-section { display: none; }
  #done-section { display: none; }
</style>
</head>
<body>

<h1>&#128222; Phone Cleaner</h1>

<!-- Not configured state -->
<div id="not-configured" style="display:none">
  <div class="config-box">
    <strong>Master sheet not configured.</strong><br>
    Go to <em>Phone Cleaner → Configure Master Sheet</em> in the menu, then re-open this sidebar.
  </div>
</div>

<!-- Main form -->
<div id="main-form">

  <!-- Source -->
  <div class="section">
    <label>Source</label>
    <div class="toggle-row">
      <div class="toggle-btn active" id="btn-url" onclick="setMode('url')">Paste URL</div>
      <div class="toggle-btn" id="btn-sel" onclick="setMode('sel')">Selected Range</div>
    </div>

    <div id="url-input">
      <input type="text" id="sheet-url" placeholder="Sheet URL or Spreadsheet ID" />
      <div style="margin-top:6px">
        <label style="margin-bottom:3px">Column index (1 = A)</label>
        <input type="number" id="col-index" value="1" min="1" style="width:80px" />
      </div>
    </div>

    <div id="sel-input" style="display:none">
      <div class="info-chip" id="sel-info">Loading selection info...</div>
    </div>
  </div>

  <!-- Default country -->
  <div class="section">
    <label>Default country <span style="font-weight:400;text-transform:none">(for 0-prefix numbers)</span></label>
    <select id="country-select">
      <option value="">Loading countries...</option>
    </select>
  </div>

  <!-- Batch -->
  <div class="section">
    <label>Batch</label>
    <div class="batch-row">
      <div class="batch-num">
        <input type="number" id="batch-num" min="1" value="1" />
      </div>
      <div class="batch-date">
        <input type="text" id="batch-date" placeholder="15 May 2025" />
      </div>
    </div>
    <div class="batch-label-preview" id="batch-label-preview">Label: —</div>
  </div>

  <div id="form-error" class="error-box" style="display:none"></div>

  <button class="btn btn-primary" id="preview-btn" onclick="runPreview()" disabled>Preview</button>
</div>

<hr class="divider">

<!-- Results -->
<div id="results-section">
  <div id="warning-box" class="warning-box" style="display:none"></div>

  <div class="summary-row">
    <div class="badge badge-new">
      <span class="num" id="count-new">0</span>
      valid new
    </div>
    <div class="badge badge-dup">
      <span class="num" id="count-dup">0</span>
      duplicate
    </div>
    <div class="badge badge-rej">
      <span class="num" id="count-rej">0</span>
      rejected
    </div>
  </div>

  <!-- Valid numbers table -->
  <div id="valid-container" style="max-height:160px;overflow-y:auto;margin-bottom:8px"></div>

  <!-- Rejects -->
  <div id="rejects-container" style="max-height:100px;overflow-y:auto"></div>

</div>

<!-- Sync -->
<div id="sync-section">
  <div id="sync-error" class="error-box" style="display:none"></div>
  <button class="btn btn-success" onclick="runSync()">Sync to master</button>
</div>

<!-- Done -->
<div id="done-section">
  <div class="success-box" id="done-msg"></div>
  <button class="btn btn-primary" style="margin-top:10px" onclick="resetForm()">Run another batch</button>
</div>

<script>
  var _mode = 'url';
  var _previewData = null;
  var _sourceId = null;
  var _selColIndex = 1;

  // ---- Init ----
  google.script.run
    .withSuccessHandler(onInitData)
    .withFailureHandler(showFormError)
    .getInitialData();

  function onInitData(data) {
    if (!data.configured) {
      document.getElementById('not-configured').style.display = 'block';
      document.getElementById('main-form').style.display = 'none';
      if (data.error) showFormError(data.error);
      return;
    }

    // Countries dropdown
    var sel = document.getElementById('country-select');
    sel.innerHTML = '';
    (data.countries || []).forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = c.code;
      opt.textContent = c.name + ' (' + c.code + ')';
      sel.appendChild(opt);
    });

    // Batch
    document.getElementById('batch-num').value = data.nextBatch || 1;
    document.getElementById('batch-date').value = data.today || '';
    updateBatchLabel();

    // Selection info
    var si = data.selection;
    if (si) {
      _selColIndex = si.colIndex || 1;
      document.getElementById('sel-info').textContent =
        si.sheetName + ' · ' + si.a1 + ' (' + si.numRows + ' rows)';
    } else {
      document.getElementById('sel-info').textContent = 'No range selected. Select a column first.';
    }

    document.getElementById('preview-btn').disabled = false;
  }

  // ---- Mode toggle ----
  function setMode(m) {
    _mode = m;
    document.getElementById('btn-url').classList.toggle('active', m === 'url');
    document.getElementById('btn-sel').classList.toggle('active', m === 'sel');
    document.getElementById('url-input').style.display  = m === 'url' ? '' : 'none';
    document.getElementById('sel-input').style.display  = m === 'sel' ? '' : 'none';
  }

  // ---- Batch label ----
  document.getElementById('batch-num').addEventListener('input', updateBatchLabel);
  document.getElementById('batch-date').addEventListener('input', updateBatchLabel);

  function updateBatchLabel() {
    var num  = document.getElementById('batch-num').value;
    var date = document.getElementById('batch-date').value;
    var label = 'Batch ' + (num || '?') + ' · ' + (date || '?');
    document.getElementById('batch-label-preview').textContent = 'Label: ' + label;
  }

  function getBatchLabel() {
    var num  = document.getElementById('batch-num').value;
    var date = document.getElementById('batch-date').value;
    return 'Batch ' + num + ' · ' + date;
  }

  // ---- Preview ----
  function runPreview() {
    clearFormError();
    var btn = document.getElementById('preview-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Running preview…';

    document.getElementById('results-section').style.display = 'none';
    document.getElementById('sync-section').style.display = 'none';
    document.getElementById('done-section').style.display = 'none';

    var params = {
      mode:           _mode,
      urlOrId:        document.getElementById('sheet-url').value.trim(),
      colIndex:       _mode === 'url'
                        ? parseInt(document.getElementById('col-index').value, 10) || 1
                        : _selColIndex,
      defaultCountry: document.getElementById('country-select').value,
      batchLabel:     getBatchLabel()
    };

    google.script.run
      .withSuccessHandler(onPreviewDone)
      .withFailureHandler(function(e) {
        showFormError(e.message || String(e));
        resetPreviewBtn();
      })
      .runPreview(params);
  }

  function onPreviewDone(data) {
    _previewData = data;
    _sourceId    = data.sourceId;

    document.getElementById('count-new').textContent = data.newCount;
    document.getElementById('count-dup').textContent = data.dupCount;
    document.getElementById('count-rej').textContent = data.rejectedCount;

    var warn = document.getElementById('warning-box');
    if (data.warning) {
      warn.textContent = '⚠️ ' + data.warning;
      warn.style.display = '';
    } else {
      warn.style.display = 'none';
    }

    // Valid table
    var vc = document.getElementById('valid-container');
    if (data.valid && data.valid.length > 0) {
      var html = '<table class="results-table"><thead><tr>' +
        '<th>Number</th><th>CC</th><th>Status</th></tr></thead><tbody>';
      data.valid.forEach(function(v) {
        html += '<tr><td>' + v.number + '</td><td>' + v.country + '</td>' +
          '<td class="status-' + v.status + '">' + v.status + '</td></tr>';
      });
      html += '</tbody></table>';
      vc.innerHTML = html;
    } else {
      vc.innerHTML = '<div style="color:#9aa0a6;font-size:12px;padding:4px 0">No valid numbers found.</div>';
    }

    // Rejects
    var rc = document.getElementById('rejects-container');
    if (data.rejected && data.rejected.length > 0) {
      var rhtml = '<div style="font-size:11px;font-weight:600;color:#5f6368;margin-bottom:4px">Rejected:</div>' +
        '<div class="reject-list">';
      data.rejected.forEach(function(r) {
        rhtml += '<div class="reject-item">' + escHtml(r.raw) +
          '<span class="reject-reason">' + r.reason + '</span></div>';
      });
      rhtml += '</div>';
      rc.innerHTML = rhtml;
    } else {
      rc.innerHTML = '';
    }

    document.getElementById('results-section').style.display = '';
    document.getElementById('sync-section').style.display = data.newCount + data.dupCount > 0 ? '' : 'none';
    document.getElementById('sync-error').style.display = 'none';

    resetPreviewBtn();
  }

  // ---- Sync ----
  function runSync() {
    var syncBtn = document.querySelector('#sync-section .btn-success');
    syncBtn.disabled = true;
    syncBtn.innerHTML = '<span class="spinner"></span>Syncing…';
    document.getElementById('sync-error').style.display = 'none';

    var params = {
      previewData: _previewData,
      batchLabel:  getBatchLabel(),
      sourceId:    _sourceId
    };

    google.script.run
      .withSuccessHandler(onSyncDone)
      .withFailureHandler(function(e) {
        document.getElementById('sync-error').textContent = e.message || String(e);
        document.getElementById('sync-error').style.display = '';
        syncBtn.disabled = false;
        syncBtn.textContent = 'Sync to master';
      })
      .syncToMaster(params);
  }

  function onSyncDone(result) {
    document.getElementById('results-section').style.display = 'none';
    document.getElementById('sync-section').style.display = 'none';
    document.getElementById('done-section').style.display = '';
    document.getElementById('done-msg').innerHTML =
      '✅ Sync complete!<br>' +
      result.newAdded + ' new numbers added &nbsp;·&nbsp; ' +
      result.dupsUpdated + ' last_seen updated &nbsp;·&nbsp; ' +
      result.rejectsLogged + ' rejects logged';
  }

  // ---- Reset ----
  function resetForm() {
    _previewData = null;
    _sourceId    = null;
    document.getElementById('results-section').style.display = 'none';
    document.getElementById('sync-section').style.display = 'none';
    document.getElementById('done-section').style.display = 'none';
    clearFormError();

    // Re-fetch initial data to get updated batch number
    document.getElementById('preview-btn').disabled = true;
    document.getElementById('country-select').innerHTML = '<option>Loading…</option>';
    google.script.run
      .withSuccessHandler(onInitData)
      .withFailureHandler(showFormError)
      .getInitialData();
  }

  // ---- Helpers ----
  function showFormError(msg) {
    var box = document.getElementById('form-error');
    box.textContent = msg.message || String(msg);
    box.style.display = '';
  }

  function clearFormError() {
    document.getElementById('form-error').style.display = 'none';
  }

  function resetPreviewBtn() {
    var btn = document.getElementById('preview-btn');
    btn.disabled = false;
    btn.textContent = 'Preview';
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
